name: release-please

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN != '' && secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Check out release commit
        if: ${{ steps.release.outputs['packages/astro-foldkit--release_created'] == 'true' && env.NPM_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs['packages/astro-foldkit--sha'] }}

      - name: Set up Bun
        if: ${{ steps.release.outputs['packages/astro-foldkit--release_created'] == 'true' && env.NPM_TOKEN != '' }}
        uses: oven-sh/setup-bun@v2

      - name: Set up Node.js
        if: ${{ steps.release.outputs['packages/astro-foldkit--release_created'] == 'true' && env.NPM_TOKEN != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install workspace dependencies
        if: ${{ steps.release.outputs['packages/astro-foldkit--release_created'] == 'true' && env.NPM_TOKEN != '' }}
        run: bun install --frozen-lockfile

      - name: Build package
        if: ${{ steps.release.outputs['packages/astro-foldkit--release_created'] == 'true' && env.NPM_TOKEN != '' }}
        run: bun run --filter @opsydyn/astro-foldkit build

      - name: Typecheck package
        if: ${{ steps.release.outputs['packages/astro-foldkit--release_created'] == 'true' && env.NPM_TOKEN != '' }}
        run: bun run --filter @opsydyn/astro-foldkit typecheck

      - name: Publish package to npm
        if: ${{ steps.release.outputs['packages/astro-foldkit--release_created'] == 'true' && env.NPM_TOKEN != '' }}
        working-directory: packages/astro-foldkit
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Note missing NPM token
        if: ${{ steps.release.outputs['packages/astro-foldkit--release_created'] == 'true' && env.NPM_TOKEN == '' }}
        run: |
          echo "Release was tagged, but npm publish was skipped because NPM_TOKEN is not configured."
          echo "Add an NPM_TOKEN repository secret to enable automated publication."
