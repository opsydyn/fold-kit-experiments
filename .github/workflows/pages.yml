name: Deploy Storybook + TypeDoc to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run --filter @opsydyn/astro-foldkit build && bun run --filter @opsydyn/foldkit-viz build

      - name: Build Storybook
        run: bun run --filter @opsydyn/web build-storybook

      - name: Build TypeDoc
        run: bun run --filter @opsydyn/foldkit-viz docs

      - name: Assemble site
        run: |
          mkdir -p _site/api
          cp -r apps/web/storybook-static/. _site/
          cp -r packages/foldkit-viz/docs/. _site/api/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
