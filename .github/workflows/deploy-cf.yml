name: Deploy Astro app to Cloudflare Workers

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'packages/astro-foldkit/**'
      - 'packages/foldkit-viz/**'
      - '.github/workflows/deploy-cf.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-cf
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run --filter @opsydyn/astro-foldkit build && bun run --filter @opsydyn/foldkit-viz build

      - name: Build Astro app
        run: bun run --filter @opsydyn/web build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: deploy --config dist/server/wrangler.json
